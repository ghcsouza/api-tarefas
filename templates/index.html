<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultador de CEP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 60px 16px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        h1 {
            font-size: 22px;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        p.subtitulo {
            font-size: 14px;
            color: #888;
            margin-bottom: 28px;
        }

        .campo {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: #4f8ef7; }

        button {
            padding: 10px 20px;
            background: #4f8ef7;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #3a7be0; }

        .resultado {
            background: #f8f9fb;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #e8eaed;
        }

        .linha {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 14px;
            border-bottom: 1px solid #eee;
        }

        .linha:last-child { border-bottom: none; }
        .linha span:first-child { color: #888; }
        .linha span:last-child { color: #1a1a1a; font-weight: 500; }

        .erro {
            background: #fff3f3;
            border: 1px solid #fcc;
            color: #c0392b;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Consultador de CEP</h1>
        <p class="subtitulo">Digite um CEP para buscar o endereço completo.</p>

        <form method="POST">
            <div class="campo">
                <input type="text" name="cep" placeholder="Ex: 57020-470" maxlength="9" autofocus />
                <button type="submit">Buscar</button>
            </div>
        </form>

        {% if erro %}
            <div class="erro">⚠ {{ erro }}</div>
        {% endif %}

        {% if dados %}
            <div class="resultado">
                <div class="linha"><span>CEP</span><span>{{ dados.cep }}</span></div>
                <div class="linha"><span>Rua</span><span>{{ dados.logradouro }}</span></div>
                <div class="linha"><span>Bairro</span><span>{{ dados.bairro }}</span></div>
                <div class="linha"><span>Cidade</span><span>{{ dados.localidade }} - {{ dados.uf }}</span></div>
                <div class="linha"><span>Região</span><span>{{ dados.regiao }}</span></div>
                <div class="linha"><span>DDD</span><span>{{ dados.ddd }}</span></div>
            </div>
        {% endif %}
    </div>
</body>
</html>
